# ╔══════════════════════════════════════════════════════════════════════════╗
# ║   WIDAD-TECH — Docker Compose (Development + Production)               ║
# ║   Services: nginx | app | mysql | redis | queue | scheduler | frontend  ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: widad

services:

  # ─────────────────────────────────────────────────────────────────────────
  # 🌐 NGINX — Reverse Proxy + Laravel Static Files
  # ─────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: widad_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - ./Back-end:/var/www/html:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro      # SSL certs (production)
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - widad_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────
  # 🐘 APP — Laravel PHP-FPM (API Backend)
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: ./Back-end
      dockerfile: Dockerfile
      target: runtime
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: widad/backend:latest
    container_name: widad_app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
    env_file:
      - ./Back-end/.env
    volumes:
      - ./Back-end:/var/www/html
      - app_storage:/var/www/html/storage/app
      - ./Back-end/storage/logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - widad_network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || php artisan about --only=Environment 2>/dev/null | grep -q 'production\\|local'"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 30s
    labels:
      - "widad.service=backend"

  # ─────────────────────────────────────────────────────────────────────────
  # ⚡ QUEUE WORKER — Laravel Queue (ProcessChatbotMessageJob, OCR, etc.)
  # ─────────────────────────────────────────────────────────────────────────
  queue:
    image: widad/backend:latest
    container_name: widad_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis",
              "--sleep=3",
              "--tries=3",
              "--max-time=3600",
              "--timeout=120",
              "--memory=256",
              "--verbose"]
    env_file:
      - ./Back-end/.env
    volumes:
      - ./Back-end:/var/www/html
      - app_storage:/var/www/html/storage/app
      - ./Back-end/storage/logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - widad_network
    labels:
      - "widad.service=queue-worker"
    deploy:
      replicas: 2   # شغّل worker اثنين للـ Jobs المتوازية
      resources:
        limits:
          memory: 512M

  # ─────────────────────────────────────────────────────────────────────────
  # 🕐 SCHEDULER — Laravel Schedule Runner (cron alternative)
  # ─────────────────────────────────────────────────────────────────────────
  scheduler:
    image: widad/backend:latest
    container_name: widad_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose 2>&1;
        sleep 60;
      done"
    env_file:
      - ./Back-end/.env
    volumes:
      - ./Back-end:/var/www/html
      - app_storage:/var/www/html/storage/app
      - ./Back-end/storage/logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - widad_network
    labels:
      - "widad.service=scheduler"

  # ─────────────────────────────────────────────────────────────────────────
  # 🗄️ MYSQL 8.0 — Primary Database
  # ─────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: widad_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-widad_root_2024}
      MYSQL_DATABASE: ${DB_DATABASE:-widad_production}
      MYSQL_USER: ${DB_USERNAME:-widad_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-widad_secret_2024}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
      - mysql_logs:/var/log/mysql
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"    # Expose for local tools (remove in prod)
    networks:
      - widad_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "${DB_USERNAME:-widad_user}",
             "--password=${DB_PASSWORD:-widad_secret_2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - "widad.service=database"

  # ─────────────────────────────────────────────────────────────────────────
  # 🔴 REDIS 7 — Cache + Queue + Session
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: widad_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-widad_redis_2024}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"    # Expose for local tools (remove in prod)
    networks:
      - widad_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-widad_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "widad.service=cache"

  # ─────────────────────────────────────────────────────────────────────────
  # ⚛️ FRONTEND — React/Vite (Nginx Static Serve)
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Front-End
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost/api/v1}
        - VITE_APP_NAME=${VITE_APP_NAME:-منصة وداد}
    image: widad/frontend:latest
    container_name: widad_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - widad_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "widad.service=frontend"
    depends_on:
      - nginx

# ─────────────────────────────────────────────────────────────────────────
# 📦 VOLUMES — Persistent Data
# ─────────────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
    name: widad_mysql_data
  mysql_logs:
    driver: local
    name: widad_mysql_logs
  redis_data:
    driver: local
    name: widad_redis_data
  app_storage:
    driver: local
    name: widad_app_storage
  nginx_logs:
    driver: local
    name: widad_nginx_logs

# ─────────────────────────────────────────────────────────────────────────
# 🌐 NETWORKS — Isolated Internal Network
# ─────────────────────────────────────────────────────────────────────────
networks:
  widad_network:
    driver: bridge
    name: widad_network
    ipam:
      config:
        - subnet: 172.20.0.0/16
