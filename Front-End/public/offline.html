<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل | وداد للصحة</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      direction: rtl;
    }

    .offline-container {
      text-align: center;
      max-width: 500px;
    }

    .offline-icon {
      font-size: 6rem;
      margin-bottom: 2rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    h1 {
      color: #1e293b;
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      color: #64748b;
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(13, 148, 136, 0.3);
    }

    .tips {
      margin-top: 3rem;
      padding: 1.5rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .tips h3 {
      color: #1e293b;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .tips ul {
      list-style: none;
      text-align: right;
    }

    .tips li {
      color: #64748b;
      padding: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tips li::before {
      content: '✓';
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>أنتِ غير متصلة</h1>
    <p>يبدو أنك غير متصلة بالإنترنت حالياً. تحققي من اتصالك وحاولي مرة أخرى.</p>
    
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 إعادة المحاولة
    </button>

    <div class="tips">
      <h3>💡 نصائح للاتصال</h3>
      <ul>
        <li>تأكدي من تشغيل الواي فاي أو بيانات الهاتف</li>
        <li>جربي إعادة تشغيل الراوتر</li>
        <li>تحققي من وجود إشارة كافية</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto retry when online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
