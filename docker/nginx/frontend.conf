# ═══════════════════════════════════════════════════════════════
# WIDAD-TECH — Nginx Frontend Configuration
# Serves: React/Vite SPA on port 80 (inside container)
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    client_max_body_size 10M;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/frontend_access.log;
    error_log  /var/log/nginx/frontend_error.log warn;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://api.widad.com wss://api.widad.com https://*.hf.space;" always;

    # ── Health Check ─────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Static Assets (Vite builds with content hash) ─────────
    # Files like: assets/vendor-react-abc123.js
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        try_files $uri =404;
    }

    # ── Other static files ────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|pdf)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA Routing (React Router) ────────────────────────────
    # All routes fallback to index.html
    # This is the Docker equivalent of the _redirects file for Cloudflare Pages
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml;
}
