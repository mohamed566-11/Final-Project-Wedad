; ═══════════════════════════════════════════════════
; WIDAD-TECH — PHP Production Configuration
; Optimized for Laravel 12 + Redis + Queue Workers
; ═══════════════════════════════════════════════════

[PHP]
; ── Core ──────────────────────────────────────
; Memory: 256MB for API + AI processing
memory_limit = 256M
max_execution_time = 120
max_input_time = 120

; ── File Uploads (OCR lab tests) ──────────────
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 5

; ── Error Display (production: off) ───────────
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php_errors.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Session ───────────────────────────────────
session.cookie_secure = On
session.cookie_httponly = On
session.cookie_samesite = Lax
session.use_strict_mode = On

; ── Security ──────────────────────────────────
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; ── Date/Time ─────────────────────────────────
date.timezone = Africa/Cairo

; ── String/Encoding ───────────────────────────
default_charset = UTF-8
mbstring.language = Neutral
mbstring.internal_encoding = UTF-8

[opcache]
; ── OPcache — significant performance boost ───
opcache.enable = On
opcache.enable_cli = On
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0       ; 0 = never revalidate (production)
opcache.validate_timestamps = 0   ; 0 = trust cached bytecode
opcache.save_comments = 1         ; needed for annotations/attributes
opcache.fast_shutdown = 1
opcache.jit = 1255
opcache.jit_buffer_size = 64M
