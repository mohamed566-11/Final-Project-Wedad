; ═══════════════════════════════════════════════════
; WIDAD-TECH — PHP-FPM Pool Configuration
; Optimized for API workload with AI processing
; ═══════════════════════════════════════════════════

[www]
user = widad
group = widad

; Listen on TCP (not unix socket) for Docker compatibility
listen = 0.0.0.0:9000
listen.backlog = 1024

; ── Process Manager ───────────────────────────
; dynamic: spawns workers as needed
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500       ; recycle workers to prevent memory leaks

; ── Timeouts ──────────────────────────────────
request_terminate_timeout = 120s
request_slowlog_timeout = 10s
slowlog = /var/www/html/storage/logs/php-fpm-slowlog.log

; ── Status Page ───────────────────────────────
pm.status_path = /fpm-status

; ── Environment Variables ─────────────────────
; Pass all env vars from the container
clear_env = no

; ── Logging ───────────────────────────────────
catch_workers_output = yes
decorate_workers_output = no
php_flag[display_errors] = off
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/www/html/storage/logs/php-fpm-errors.log

; ── Security ──────────────────────────────────
security.limit_extensions = .php
