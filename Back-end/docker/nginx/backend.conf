# ═══════════════════════════════════════════════════════════════
# WIDAD-TECH — Nginx Backend Configuration
# Serves: Laravel PHP-FPM API on port 80
# ═══════════════════════════════════════════════════════════════

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 25M;      # Match PHP upload_max_filesize

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/widad_access.log;
    error_log  /var/log/nginx/widad_error.log warn;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Block Access to Sensitive Files ──────────────────────
    location ~ /\.env {
        deny all;
        return 403;
    }

    location ~ /\.git {
        deny all;
        return 403;
    }

    location ~ /\.(ht|gitignore|editorconfig) {
        deny all;
        return 403;
    }

    # ── Health Check (Laravel /up endpoint) ──────────────────
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ── PHP-FPM Status (internal only) ───────────────────────
    location = /fpm-status {
        access_log off;
        allow 172.20.0.0/16;    # Docker internal network only
        deny all;
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Static Assets (cached aggressively) ──────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        try_files $uri =404;
    }

    # ── Storage Files (uploaded lab results, images) ─────────
    location /storage {
        alias /var/www/html/storage/app/public;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Main Laravel Router ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ──────────────────────────────────────────────
    location ~ \.php$ {
        # Only process .php files that exist
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        include fastcgi_params;

        # ── PHP-FPM Timeouts ─────────────────────────────────
        fastcgi_connect_timeout 10s;
        fastcgi_read_timeout 120s;     # For AI requests (Chatbot, OCR)
        fastcgi_send_timeout 120s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;

        # ── Hide PHP Version ─────────────────────────────────
        fastcgi_hide_header X-Powered-By;
    }

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml;
}
